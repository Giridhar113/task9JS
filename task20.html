<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Working Chat Box</title>
    <style>
        /* 1. CHAT WIDGET DESIGN */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; }

        #chat-circle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #00263e;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0px 10px 15px rgba(0,0,0,0.1);
            font-size: 24px;
            z-index: 1000;
        }

        .chat-box {
            display: none; /* Hidden by default */
            position: fixed;
            right: 30px;
            bottom: 100px;
            width: 350px;
            max-height: 500px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 5px 40px rgba(0,0,0,0.2);
            flex-direction: column;
            overflow: hidden;
            z-index: 1000;
        }

        .chat-header {
            background: #00263e;
            padding: 15px;
            color: white;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }

        /* 2. MESSAGES AREA */
        .chat-logs {
            padding: 15px;
            height: 300px;
            overflow-y: auto;
            background: #f7f7f7;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 80%;
            font-size: 14px;
            line-height: 1.4;
        }

        .bot { background: #e4e6eb; align-self: flex-start; color: #050505; }
        .user { background: #00263e; align-self: flex-end; color: white; }

        /* 3. INPUT AREA */
        .chat-input {
            padding: 15px;
            display: flex;
            border-top: 1px solid #eee;
        }

        .chat-input input {
            flex: 1;
            border: none;
            outline: none;
            padding: 10px;
            font-size: 14px;
        }

        .chat-input button {
            background: none;
            border: none;
            color: #00263e;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="chat-circle" onclick="toggleChat()">💬</div>

    <div class="chat-box" id="chatBox">
        <div class="chat-header">
            <span>Live Support</span>
            <span style="cursor:pointer" onclick="toggleChat()">×</span>
        </div>
        
        <div class="chat-logs" id="chatLogs">
            <div class="message bot">Hello! How can I help you today?</div>
        </div>

        <div class="chat-input">
            <input type="text" id="chatInput" placeholder="Send a message..." onkeypress="handleEnter(event)">
            <button onclick="sendMessage()">SEND</button>
        </div>
    </div>

    <script>
        // TOGGLE OPEN/CLOSE
        function toggleChat() {
            const chatBox = document.getElementById('chatBox');
            chatBox.style.display = (chatBox.style.display === 'flex') ? 'none' : 'flex';
        }

        // SEND MESSAGE LOGIC
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const logs = document.getElementById('chatLogs');
            const text = input.value.trim();

            if (text !== "") {
                // 1. Create User Bubble
                const userMsg = document.createElement('div');
                userMsg.className = 'message user';
                userMsg.innerText = text;
                logs.appendChild(userMsg);

                // 2. Clear Input
                input.value = "";

                // 3. Scroll to bottom
                logs.scrollTop = logs.scrollHeight;

                // 4. Fake Bot "Auto-Reply"
                setTimeout(() => {
                    const botMsg = document.createElement('div');
                    botMsg.className = 'message bot';
                    botMsg.innerText = "Thanks for your message! Our team will get back to you shortly.";
                    logs.appendChild(botMsg);
                    logs.scrollTop = logs.scrollHeight;
                }, 1000);
            }
        }

        // SEND ON ENTER KEY
        function handleEnter(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
